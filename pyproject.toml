[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hoard-erd"
version = "0.3.9"
description = "Heritage Observation And Report Drafter — local multi-stage AI pipeline for archaeological grey literature reports"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Mark Bouck" },
]

dependencies = [
    # CLI
    "typer>=0.12",
    "rich>=13",

    # HTTP
    "requests>=2",

    # Image processing
    "pillow>=10",
    "opencv-python-headless>=4.9",
    "wand>=0.6",

    # Data
    "pandas>=2",
    "openpyxl>=3",
    "pyyaml>=6",

    # Shared data models (auto-generated from heritage-types TypeSpec)
    "heritage-models>=2.0,<3.0",

    # OCR (loaded on demand)
    # "transformers>=4.40",     # TrOCR
    # "torch>=2",               # PyTorch

    # Reporting
    # pandoc is a system-level dependency, not pip
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.4",
    "mypy>=1",
    "docling>=2",
    "markdown>=3",
    "numpy>=1.24",
    "wand>=0.6",
]
ark = [
    "sentence-transformers>=3",
    "numpy>=1.24",
]
ocr = [
    "transformers>=4.40",
    "torch>=2",
    "accelerate>=0.30",
]
llm = [
    "llama-cpp-python>=0.3",
]
doc = [
    "python-docx>=1",
]

[project.scripts]
hoard = "hoard.cli.main:app"

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disable_error_code = ["import-untyped"]

[[tool.mypy.overrides]]
module = ["docx", "docx.*", "docling", "docling.*", "wand", "wand.*", "pyhanko", "pyhanko.*", "pyhanko_certvalidator", "pyhanko_certvalidator.*"]
ignore_errors = true

[tool.setuptools.packages.find]
where = ["src"]
