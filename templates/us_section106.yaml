# HOARD Jurisdiction Template: United States — Section 106 Compliance
# Based on: 36 CFR Part 800 (Section 106 of the National Historic Preservation Act)
#           Secretary of the Interior's Standards and Guidelines for Archaeology
#           State Historic Preservation Office (SHPO) format guidelines
# Version: 2024

jurisdiction: "United States — Section 106 (NRHP Eligibility Evaluation)"
version: "2024"

mandatory_sections:
  - id: executive_summary
    label: "Executive Summary"
    max_words: 500
    required_fields:
      - project_name
      - location
      - federal_agency
      - undertaking_description
      - area_of_potential_effects
      - fieldwork_dates
      - key_findings
      - nrhp_recommendation       # National Register of Historic Places eligibility
      - effect_determination

  - id: introduction
    label: "Introduction"
    required_fields:
      - project_background
      - undertaking_description
      - federal_involvement         # Federal agency, funding, or permitting trigger
      - area_of_potential_effects  # APE defined
      - regulatory_context         # Section 106 review process
      - report_scope

  - id: environmental_context
    label: "Environmental Context"
    required_fields:
      - physiographic_region
      - geology_and_soils
      - hydrology
      - flora_and_fauna

  - id: cultural_context
    label: "Cultural Context"
    required_fields:
      - prehistoric_context_summary
      - protohistoric_context_summary
      - historical_context_summary
      - previous_investigations
      - historic_property_listings   # NRHP-listed properties in APE

  - id: research_design
    label: "Research Design and Methods"
    required_fields:
      - research_questions
      - field_methods
      - laboratory_methods
      - curation_methods

  - id: results
    label: "Results"
    sub_sections:
      - prehistoric_periods
      - protohistoric_periods
      - historic_periods
      - isolated_finds
    required_per_sub:
      - feature_summary
      - artifact_summary
      - spatial_distribution

  - id: artifact_analyses
    label: "Artifact Analyses"
    sub_sections:
      - lithics
      - ceramics
      - glass
      - metal
      - faunal
      - botanical
      - other
    required_per_sub: []

  - id: nrhp_evaluation
    label: "National Register Evaluation"
    required_fields:
      - criterion_a                 # Association with significant events
      - criterion_b                 # Association with significant persons
      - criterion_c                 # Distinctive design/construction
      - criterion_d                 # Information potential
      - eligibility_recommendation  # Eligible / Not Eligible / Unevaluated
      - justification

  - id: effects_assessment
    label: "Effects Assessment"
    required_fields:
      - criteria_of_effect          # No adverse effect / Adverse effect
      - avoidance_measures          # If applicable
      - mitigation_plan             # If applicable

  - id: bibliography
    label: "References Cited"

appendices:
  - id: context_register
    label: "Context Register"
    auto_generate: true

  - id: artifact_catalogue
    label: "Artifact Catalogue"
    auto_generate: true

  - id: laboratory_methods
    label: "Laboratory Methods"
    auto_generate: false
    note: "Describe flotation, radiocarbon preparation, residue analysis methods"

  - id: shpo_correspondence
    label: "SHPO Consultation Correspondence"
    auto_generate: false
    note: "Attach relevant SHPO comments and consultation records"

heading_style: "title_case"
figure_caption_format: "Figure {n}. {description}."
table_caption_format: "Table {n}. {description}."
citation_style: "author_date"

prohibited_terms: []  # US reports have fewer style prohibitions

context_number_format: "parentheses"  # US convention: (001) not [001]
figure_placement: "end_of_section"

export:
  docx:
    reference_template: "templates/shpo_reference.docx"
  pdf:
    page_size: "letter"
    margin: "2.54cm"                # 1 inch margins per US standards
  digital_archive:
    formats: ["PDF/A"]
