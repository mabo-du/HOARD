name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libmagickwand-dev pandoc graphviz libcairo2 libpango-1.0-0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          source .venv/bin/activate
          ruff check src/

      - name: Type-check (mypy)
        run: |
          source .venv/bin/activate
          mypy src/ --ignore-missing-imports --disable-error-code import-untyped
        continue-on-error: true

      - name: Test (pytest, CPU-only)
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -v --tb=short -k "not gpu" --ignore=tests/test_nuextract3.py --ignore=tests/test_benchmark.py

      - name: Verify CLI entry point
        run: |
          source .venv/bin/activate
          python -m hoard --help
