name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libmagickwand-dev pandoc graphviz

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/

      - name: Type-check (mypy)
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # mypy strictness can be tightened later

      - name: Test (pytest)
        run: python -m pytest tests/ -v --tb=short --cov=erd --cov-report=term-missing

      - name: Verify CLI entry point
        run: erd --help
